{{define "categories"}}
{{template "head" .}}
<h1>Categories</h1>
<p>{{len .Categories}} categories</p>
<div class="categories-list">
{{range .Categories}}
<div class="cat-item">
		<a href="{{categoryPath .Name}}" data-help="Open the latest cached papers in this arXiv subject area.">{{.Name}}</a>
		<span class="cat-count helpable" tabindex="0" data-help="Cached papers currently indexed in this category.">({{.Count}})</span>
</div>
{{end}}
</div>
{{template "foot" .}}
{{end}}
