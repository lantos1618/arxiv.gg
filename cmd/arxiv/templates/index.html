{{define "index"}}
{{template "head" .}}
<h1>arXiv.gg</h1>
<div class="search-container">
	<form class="search-bar" action="/search" method="get" id="search-form" role="search">
		<input type="text" name="q" id="search-input" class="search-input" placeholder="Search or paste arXiv ID/URL..." value="{{.Query}}" autocomplete="off" aria-label="Search papers">
		<div class="search-buttons">
			<button type="submit" class="search-btn search-btn-keyword" id="btn-keyword">
				<span class="btn-icon">🔍</span><span>Keyword</span>
			</button>
			<button type="button" class="search-btn search-btn-semantic" id="btn-semantic">
				<span class="btn-icon">🧠</span><span>Semantic</span>
			</button>
		</div>
	</form>
	<div class="search-dropdown" id="search-dropdown"></div>
</div>
<div id="search-results" class="search-results"></div>
<p id="stats-line"><span id="stat-total">{{.Stats.TotalPapers}}</span> papers indexed (<span id="stat-embed">{{.Stats.EmbeddingsCount}}</span> with embeddings)</p>

<div id="recent-papers">
<h2>Recent Papers</h2>
<div id="recent-papers-list">
	<p class="loading-status">Loading recent papers...</p>
</div>
</div>
<script>
(function() {
	const input = document.getElementById('search-input');
	const searchBar = document.querySelector('.search-bar');
	const dropdown = document.getElementById('search-dropdown');
	const results = document.getElementById('search-results');
	const recent = document.getElementById('recent-papers');
	const recentList = document.getElementById('recent-papers-list');
	const btnKeyword = document.getElementById('btn-keyword');
	const btnSemantic = document.getElementById('btn-semantic');
	const statTotal = document.getElementById('stat-total');
	const statEmbed = document.getElementById('stat-embed');
	let timeout = null;
	let selectedIndex = -1;
		let dropdownItems = [];
		let searchController = null;
		let searchRequestId = 0;
		const authorDisplayLimit = 12;

	function updateStats(paper) {
		statTotal.textContent = parseInt(statTotal.textContent) + 1;
	}

		function renderAuthors(authors) {
			const allAuthors = authors.replace(/ and /g, ', ').split(',').map(a => a.trim()).filter(a => a);
			const visibleAuthors = allAuthors.slice(0, authorDisplayLimit);
			const links = visibleAuthors.map(a =>
				'<a href="/author/' + encodeURIComponent(a) + '">' + escapeHtml(a) + '</a>'
			).join(', ');
			const extra = allAuthors.length - visibleAuthors.length;
			return links + (extra > 0 ? ' <span class="more-authors">+' + extra + ' more</span>' : '');
		}

	function renderRecentPaper(p) {
		const id = p.ID || p.id;
		const title = p.Title || p.title || '';
		const authors = p.Authors || p.authors || '';
		const categories = p.Categories || p.categories || '';
			const hasEmbed = p.hasEmbedding || p.HasEmbedding;
			const cats = categories.split(' ').filter(c => c).map(c =>
				'<a class="cat-link" href="/category/' + encodeURIComponent(c) + '">' + escapeHtml(c) + '</a>'
			).join(' ');
		const badges = hasEmbed ? '<span class="badge badge-embed">🧠</span>' : '';
		return '<div class="paper"><span class="paper-id">' + id + '</span> ' + badges +
			'<div class="paper-title"><a href="/paper/' + id + '">' + escapeHtml(title) + '</a></div>' +
			'<div class="paper-authors">' + renderAuthors(authors) + '</div>' +
			'<div class="paper-categories">' + cats + '</div></div>';
	}

	function loadRecentPapers() {
		const eventSource = new EventSource('/api/v1/papers/recent/stream?limit=50');
		let paperCount = 0;
		let initialLoadComplete = false;
		eventSource.onmessage = function(e) {
			const data = JSON.parse(e.data);
			switch (data.type) {
				case 'start': recentList.innerHTML = ''; break;
				case 'paper': paperCount++; recentList.insertAdjacentHTML('beforeend', renderRecentPaper(data.paper)); break;
				case 'complete':
					initialLoadComplete = true;
					if (paperCount === 0) recentList.innerHTML = '<p>No papers cached yet.</p>';
					break;
				case 'new':
					paperCount++;
					recentList.insertAdjacentHTML('afterbegin', renderRecentPaper(data.paper).replace('class="paper"', 'class="paper paper-new"'));
					updateStats(data.paper);
					break;
				case 'timeout': eventSource.close(); setTimeout(loadRecentPapers, 100); break;
				case 'error': recentList.innerHTML = '<p class="error">Error: ' + escapeHtml(data.error) + '</p>'; eventSource.close(); break;
			}
		};
		eventSource.onerror = function() {
			if (!initialLoadComplete && paperCount === 0) recentList.innerHTML = '<p class="error">Failed to load.</p>';
			eventSource.close();
			setTimeout(loadRecentPapers, 5000);
		};
	}
	loadRecentPapers();

	function escapeHtml(s) {
		const div = document.createElement('div');
		div.textContent = s;
		return div.innerHTML;
	}

	function extractArxivID(input) {
		input = input.trim();
		const newFormat = /^(\d{4}\.\d{4,6})$/;
		if (newFormat.test(input)) return input;
		const oldFormat = /^([a-z-]+\/\d{7,})$/i;
		if (oldFormat.test(input)) return input;
		const urlPattern = /arxiv\.org\/(?:abs|pdf)\/(\d{4}\.\d{4,6}|[a-z-]+\/\d{7,})/i;
		const match = input.match(urlPattern);
		if (match) return match[1].replace(/v\d+$/, '');
		return null;
	}

	function showDropdown() {
		dropdown.classList.add('open');
		searchBar.classList.add('dropdown-open');
	}

	function hideDropdown() {
		dropdown.classList.remove('open');
		searchBar.classList.remove('dropdown-open');
		selectedIndex = -1;
	}

	function updateSelection() {
		dropdownItems.forEach((item, i) => {
			item.classList.toggle('selected', i === selectedIndex);
		});
	}

	// Live dropdown search with abort + request tracking
	function doDropdownSearch(query) {
		// Cancel any pending request
		if (searchController) {
			searchController.abort();
			searchController = null;
		}

		if (!query.trim()) {
			hideDropdown();
			return;
		}

		const arxivID = extractArxivID(query);
		if (arxivID) {
			dropdown.innerHTML = '<a class="dropdown-item" href="/paper/' + arxivID + '">' +
				'<div class="dropdown-item-id">' + escapeHtml(arxivID) + '</div>' +
				'<div class="dropdown-item-title">Go to paper →</div></a>';
			showDropdown();
			dropdownItems = Array.from(dropdown.querySelectorAll('.dropdown-item'));
			return;
		}

		dropdown.innerHTML = '<div class="dropdown-status">Searching...</div>';
		showDropdown();

		// Track this request
		const thisRequestId = ++searchRequestId;
		searchController = new AbortController();

		fetch('/api/v1/search/quick?q=' + encodeURIComponent(query) + '&limit=10', {
			signal: searchController.signal
		})
			.then(r => r.json())
			.then(resp => {
				// Ignore if a newer request was made
				if (thisRequestId !== searchRequestId) return;

				// API returns {success, data: {count, papers}}
				const papers = resp.data?.papers || [];
				const total = resp.data?.count || papers.length;

				if (papers.length === 0) {
					dropdown.innerHTML = '<div class="dropdown-status">No results found</div>';
					dropdownItems = [];
					return;
				}
				let html = '';
				papers.forEach(p => {
					const id = p.id || p.ID;
					const title = p.title || p.Title || '';
					const authors = p.authors || p.Authors || '';
					html += '<a class="dropdown-item" href="/paper/' + id + '">' +
						'<div class="dropdown-item-id">' + id + '</div>' +
						'<div class="dropdown-item-title">' + escapeHtml(title) + '</div>' +
						'<div class="dropdown-item-authors">' + escapeHtml(authors) + '</div></a>';
				});
				if (total > 10) {
					html += '<div class="dropdown-footer"><span>' + total + ' total results</span>' +
						'<a href="/search?q=' + encodeURIComponent(query) + '">View all →</a></div>';
				}
				dropdown.innerHTML = html;
				dropdownItems = Array.from(dropdown.querySelectorAll('.dropdown-item'));
				selectedIndex = -1;
			})
			.catch(err => {
				// Ignore aborted requests
				if (err.name === 'AbortError') return;
				// Only show error if this is still the current request
				if (thisRequestId === searchRequestId) {
					dropdown.innerHTML = '<div class="dropdown-status">Search failed</div>';
					dropdownItems = [];
				}
			});
	}

	// Full page search (for Keyword button / Enter on results page)
	let activeEventSource = null;
	function doFullSearch(query, isSemantic) {
		hideDropdown();
		if (!query.trim()) {
			results.innerHTML = '';
			recent.style.display = '';
			return;
		}

		const arxivID = extractArxivID(query);
		if (arxivID) {
			window.location.href = '/paper/' + arxivID;
			return;
		}

		if (activeEventSource) { activeEventSource.close(); activeEventSource = null; }

		if (isSemantic) {
			results.innerHTML = '<div class="terminal active" id="search-terminal">' +
				'<div class="terminal-header"><span class="terminal-dot red"></span><span class="terminal-dot yellow"></span>' +
				'<span class="terminal-dot green"></span><span class="terminal-title">semantic search</span></div>' +
				'<div class="terminal-body"><div class="terminal-line prompt">search --semantic "' + escapeHtml(query) + '"</div>' +
				'<div class="terminal-line info" id="terminal-status">Generating embedding...<span class="terminal-cursor"></span></div></div></div>' +
				'<p class="search-status" id="search-status" style="display:none;"></p><div id="paper-results"></div>';
		} else {
			results.innerHTML = '<p class="search-status" id="search-status">Searching...</p><div id="paper-results"></div>';
		}
		recent.style.display = 'none';

		const params = new URLSearchParams({ q: query, limit: '100' });
		if (isSemantic) params.append('mode', 'semantic');

		activeEventSource = new EventSource('/api/v1/search/stream?' + params.toString());
		const paperContainer = document.getElementById('paper-results');
		const statusEl = document.getElementById('search-status');
		const terminalStatus = document.getElementById('terminal-status');
		const terminal = document.getElementById('search-terminal');
		let resultCount = 0;

		activeEventSource.onmessage = function(e) {
			const data = JSON.parse(e.data);
			switch (data.type) {
				case 'start':
					if (isSemantic && terminalStatus) terminalStatus.innerHTML = 'Generating embedding...<span class="terminal-cursor"></span>';
					else statusEl.textContent = 'Searching...';
					break;
				case 'status':
					if (isSemantic && terminalStatus) terminalStatus.innerHTML = data.message + '<span class="terminal-cursor"></span>';
					else statusEl.textContent = data.message;
					break;
				case 'result':
					resultCount++;
					if (terminal) terminal.classList.remove('active');
					statusEl.style.display = '';
					const p = data.paper;
					const id = p.id || p.ID;
					const title = p.title || p.Title || '';
						const authors = p.authors || p.Authors || '';
						const categories = p.categories || p.Categories || '';
						const hasEmbed = p.hasEmbedding || p.HasEmbedding;
						const similarity = data.similarity;
						const cats = categories.split(' ').filter(c => c).map(c =>
							'<a class="cat-link" href="/category/' + encodeURIComponent(c) + '">' + escapeHtml(c) + '</a>').join(' ');
					const badges = hasEmbed ? '<span class="badge badge-embed">🧠</span>' : '';
					const simBadge = similarity ? '<span class="badge badge-similarity">' + Math.round(similarity * 100) + '%</span>' : '';
					paperContainer.insertAdjacentHTML('beforeend', '<div class="paper"><span class="paper-id">' + id + '</span> ' +
						badges + ' ' + simBadge + '<div class="paper-title"><a href="/paper/' + id + '">' + escapeHtml(title) + '</a></div>' +
						'<div class="paper-authors">' + renderAuthors(authors) + '</div><div class="paper-categories">' + cats + '</div></div>');
					statusEl.textContent = resultCount + ' results...';
					break;
				case 'complete':
					if (terminal) terminal.classList.remove('active');
					statusEl.style.display = '';
					statusEl.textContent = data.count + ' ' + (data.mode === 'semantic' ? 'semantic' : 'keyword') + ' results for "' + escapeHtml(query) + '"';
					activeEventSource.close(); activeEventSource = null;
					break;
				case 'error':
					if (terminal) terminal.classList.remove('active');
					statusEl.style.display = '';
					statusEl.textContent = data.error;
					statusEl.style.color = '#dc2626';
					activeEventSource.close(); activeEventSource = null;
					break;
			}
		};
		activeEventSource.onerror = function() {
			if (resultCount === 0) { statusEl.textContent = 'Search failed'; statusEl.style.color = '#dc2626'; }
			if (activeEventSource) { activeEventSource.close(); activeEventSource = null; }
		};
	}

	// Event handlers - 300ms debounce to prevent request spam
	let lastQuery = '';
	input.addEventListener('input', function() {
		clearTimeout(timeout);
		const query = input.value;
		// Don't search if query hasn't changed
		if (query === lastQuery) return;
		timeout = setTimeout(() => {
			if (query === input.value) { // Double-check query hasn't changed
				lastQuery = query;
				doDropdownSearch(query);
			}
		}, 300);
	});

	input.addEventListener('focus', function() {
		// Only search on focus if we haven't already searched this query
		const query = input.value.trim();
		if (query && query !== lastQuery) {
			lastQuery = query;
			doDropdownSearch(query);
		}
	});

	input.addEventListener('keydown', function(e) {
		if (!dropdown.classList.contains('open')) return;
		if (e.key === 'ArrowDown') {
			e.preventDefault();
			selectedIndex = Math.min(selectedIndex + 1, dropdownItems.length - 1);
			updateSelection();
		} else if (e.key === 'ArrowUp') {
			e.preventDefault();
			selectedIndex = Math.max(selectedIndex - 1, -1);
			updateSelection();
		} else if (e.key === 'Enter' && selectedIndex >= 0) {
			e.preventDefault();
			dropdownItems[selectedIndex].click();
		} else if (e.key === 'Escape') {
			hideDropdown();
		}
	});

	document.addEventListener('click', function(e) {
		if (!e.target.closest('.search-container')) hideDropdown();
	});

	document.getElementById('search-form').addEventListener('submit', function(e) {
		e.preventDefault();
		hideDropdown();
		window.location.href = '/search?q=' + encodeURIComponent(input.value);
	});

	btnSemantic.addEventListener('click', function() {
		doFullSearch(input.value, true);
	});

})();
</script>
{{template "foot" .}}
{{end}}
