services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: arxiv-postgres
    environment:
      POSTGRES_USER: arxiv
      POSTGRES_PASSWORD: arxiv
      POSTGRES_DB: arxiv
    volumes:
      - arxiv_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arxiv -d arxiv"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  arxiv:
    build: .
    container_name: arxiv-container
    ports:
      - "80:80"
    environment:
      DATABASE_URL: postgres://arxiv:arxiv@postgres:5432/arxiv?sslmode=disable
      ARXIV_CACHE: /data/arxiv
    volumes:
      - /data/arxiv:/data/arxiv
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  arxiv_postgres_data:
    external: true
