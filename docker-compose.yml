version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: arxiv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arxiv
      POSTGRES_PASSWORD: arxiv
      POSTGRES_DB: arxiv
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arxiv -d arxiv"]
      interval: 5s
      timeout: 5s
      retries: 5

  arxiv:
    build: .
    container_name: arxiv-container
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://arxiv:arxiv@postgres:5432/arxiv?sslmode=disable
      ARXIV_CACHE: /data/arxiv
    volumes:
      - /data/arxiv:/data/arxiv
    ports:
      - "80:80"

volumes:
  postgres_data:
    driver: local
