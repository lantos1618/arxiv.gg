services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: arxiv-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arxiv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-arxiv}
    volumes:
      - arxiv_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-arxiv} -d $${POSTGRES_DB:-arxiv}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  arxiv:
    build: .
    container_name: arxiv-container
    user: "1000:1000"
    init: true
    ports:
      - "127.0.0.1:80:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      ARXIV_CACHE: /data/arxiv
      PORT: 8080
      HOME: /home/arxiv
      HF_HOME: /data/arxiv/huggingface
      SENTENCE_TRANSFORMERS_HOME: /data/arxiv/sentence-transformers
      TRANSFORMERS_CACHE: /data/arxiv/huggingface/transformers
      PYTHONDONTWRITEBYTECODE: "1"
      ADMIN_TOKEN: ${ADMIN_TOKEN:?ADMIN_TOKEN is required}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      INDEXNOW_KEY: ${INDEXNOW_KEY:-34af0c26368622541e3ca8aa555c3ad7}
      ARXIV_OFFICIAL_TOTAL_PAPERS: ${ARXIV_OFFICIAL_TOTAL_PAPERS:-3045638}
      ARXIV_OFFICIAL_TOTAL_PAPERS_AS_OF: ${ARXIV_OFFICIAL_TOTAL_PAPERS_AS_OF:-2026-05-16}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-https://arxiv.gg/auth/google/callback}
    volumes:
      - /data/arxiv:/data/arxiv
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=512m
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  arxiv_postgres_data:
    external: true

networks:
  default:
    name: arxiv-network
    external: true
